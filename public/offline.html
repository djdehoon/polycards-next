<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#059669" />
    <title>PolyCards — Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #0f0f0f;
        color: #f4f4f5;
        padding: 1.5rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1.25rem;
        color: #a1a1aa;
        max-width: 22rem;
        line-height: 1.5;
      }
      a {
        color: #34d399;
        font-weight: 600;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1>You are offline</h1>
    <p>PolyCards needs a connection to load this page. Check your network, then try again.</p>
    <p><a href="/">Back to home</a></p>
  </body>
</html>
